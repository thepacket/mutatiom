name: Bug report
description: Something in Mutatiom is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Every reproducible report
        helps.

        Before filing, a quick check: please scan the open issues for an
        existing report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A short description of what went wrong.
      placeholder: e.g. "The wavefunction overlay renders off the plot when the barrier slider is at max"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What did you think would happen instead?
      placeholder: e.g. "Eigenstates stay within the plot frame at every parameter value"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: |
        Steps to reproduce. Even better: list the exact model parameters
        (barrier height, transfer distance, asymmetry, temperature, particle)
        so the state can be recreated.
      placeholder: |
        1. Set barrier height to 12 kcal/mol
        2. Set proton-transfer distance to 1.2 Å
        3. Observe the wavefunction overlay
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mutatiom version
      description: |
        The version from `package.json`, plus the short commit SHA if you
        can get it (`git rev-parse --short HEAD`).
      placeholder: 0.1.0 (13e2e89)
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Where
      description: How are you running it?
      options:
        - Local dev (`npm run dev`)
        - Local build (`npm run build` + preview)
        - Self-hosted (other)
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Browser + version + OS.
      placeholder: e.g. "Chrome 144 on macOS 15.5"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Browser console / network errors (if any)
      description: |
        Open DevTools → Console + Network tabs. Paste any red errors
        or failing requests here. Skip if there's nothing relevant.
      render: shell
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, screen recordings, hypotheses about the root cause, related issues — drop them here.
    validations:
      required: false
